name: Audit source URLs

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'metadata/acts/*.json'
      - 'scripts/audit-source-url.mjs'
      - '.github/workflows/source-audit.yml'

permissions:
  contents: read

jobs:
  source-audit:
    name: Audit changed metadata source URLs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: List changed metadata files
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          files="$RUNNER_TEMP/source-audit-metadata-files.txt"
          fetch_files="$RUNNER_TEMP/source-audit-fetch-metadata-files.txt"
          git diff --name-only --diff-filter=AMR \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            -- 'metadata/acts/*.json' | sort > "$files"

          if [ -s "$files" ]; then
            echo "has_changed_metadata=true" >> "$GITHUB_OUTPUT"
            echo "Changed metadata files:"
            cat "$files"

            BASE_SHA="${{ github.event.pull_request.base.sha }}" \
            HEAD_SHA="${{ github.event.pull_request.head.sha }}" \
            SOURCE_AUDIT_FILES="$files" \
            SOURCE_AUDIT_FETCH_FILES="$fetch_files" \
            node - <<'NODE'
              const { execFileSync } = require('node:child_process')
              const fs = require('node:fs')

              const baseSha = process.env.BASE_SHA
              const headSha = process.env.HEAD_SHA
              const files = fs.readFileSync(process.env.SOURCE_AUDIT_FILES, 'utf8')
                .split(/\n/)
                .map((line) => line.trim())
                .filter(Boolean)

              function readMetadata(ref, file) {
                try {
                  return JSON.parse(execFileSync('git', ['show', `${ref}:${file}`], {
                    encoding: 'utf8',
                    stdio: ['ignore', 'pipe', 'ignore'],
                  }))
                } catch {
                  return null
                }
              }

              const filesNeedingFetch = []
              for (const file of files) {
                const before = readMetadata(baseSha, file)
                const after = readMetadata(headSha, file)
                if (!after) continue

                const sourceChanged = !before ||
                  before.source_url !== after.source_url ||
                  before.official_detail_url !== after.official_detail_url

                if (sourceChanged) filesNeedingFetch.push(file)
              }

              fs.writeFileSync(
                process.env.SOURCE_AUDIT_FETCH_FILES,
                filesNeedingFetch.length ? `${filesNeedingFetch.join('\n')}\n` : '',
              )
            NODE

            if [ -s "$fetch_files" ]; then
              echo "has_fetch_metadata=true" >> "$GITHUB_OUTPUT"
              echo "Metadata files with new or changed source URLs:"
              cat "$fetch_files"
            else
              echo "has_fetch_metadata=false" >> "$GITHUB_OUTPUT"
              echo "No new or changed metadata source URLs to fetch."
            fi
          else
            echo "has_changed_metadata=false" >> "$GITHUB_OUTPUT"
            echo "has_fetch_metadata=false" >> "$GITHUB_OUTPUT"
            echo "No changed metadata/acts/*.json files to audit."
          fi

      - name: Verify source URL hostnames
        if: steps.changed.outputs.has_changed_metadata == 'true'
        shell: bash
        env:
          SOURCE_AUDIT_FILES: ${{ runner.temp }}/source-audit-metadata-files.txt
        run: |
          set -euo pipefail

          node -e '
            const fs = require("node:fs")
            const allowed = [
              "legislatie.just.ro",
              "monitoruloficial.ro",
              "mdlpa.ro",
              "iscir.ro",
              "anre.ro",
              "igsu.ro",
              "asro.ro",
              "mmediu.ro",
              "anap.gov.ro",
              "isc.gov.ro",
            ]
            const files = fs.readFileSync(process.env.SOURCE_AUDIT_FILES, "utf8")
              .split(/\n/)
              .map((line) => line.trim())
              .filter(Boolean)

            let failed = false
            for (const file of files) {
              const metadata = JSON.parse(fs.readFileSync(file, "utf8"))
              const selectedUrl = metadata.source_url || metadata.official_detail_url

              if (!selectedUrl) {
                console.error(`${file}: missing source_url / official_detail_url`)
                failed = true
                continue
              }

              let hostname
              try {
                hostname = new URL(selectedUrl).hostname.toLowerCase()
              } catch (error) {
                console.error(`${file}: invalid source URL (${error.message})`)
                failed = true
                continue
              }

              const isAllowed = allowed.some((domain) => hostname === domain || hostname.endsWith(`.${domain}`))
              if (!isAllowed) {
                console.error(`${file}: ${hostname} is not approved for automated source-audit fetches`)
                failed = true
              }
            }

            if (failed) process.exit(1)
          '

      - name: Audit source URLs
        if: steps.changed.outputs.has_fetch_metadata == 'true'
        shell: bash
        env:
          SOURCE_AUDIT_FILES: ${{ runner.temp }}/source-audit-fetch-metadata-files.txt
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            slug="$(basename "$file" .json)"

            echo "::group::source audit: $slug"
            if ! node scripts/audit-source-url.mjs "$slug"; then
              hostname="$(node -e 'const fs = require("node:fs"); const metadata = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const url = metadata.source_url || metadata.official_detail_url; process.stdout.write(new URL(url).hostname.toLowerCase())' "$file")"
              if [[ "$hostname" == "mdlpa.ro" || "$hostname" == *.mdlpa.ro ]]; then
                echo "::warning::MDLPA source is allowlisted but unreachable from this GitHub runner; preserving local/source provenance review requirement for $slug"
              else
                exit 1
              fi
            fi
            echo "::endgroup::"
          done < "$SOURCE_AUDIT_FILES"
