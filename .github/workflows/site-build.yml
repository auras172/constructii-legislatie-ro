name: Build site

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'metadata/**'
      - 'legi/**'
      - 'import-log/**'
      - 'vercel.json'
  pull_request:
    paths:
      - 'site/**'
      - 'metadata/**'
      - 'legi/**'
      - 'import-log/**'
      - 'vercel.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: cd site && npm ci

      - name: Build site
        run: cd site && npm run build
